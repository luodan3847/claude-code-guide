name: Daily News Scrape & Summarize

on:
  schedule:
    # Run every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  scrape-and-summarize:
    name: Scrape sources and summarize with Claude
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scraper.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run summarizer (Claude API)
        run: node scripts/summarizer.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated data
        run: |
          git config user.name "claude-bot"
          git config user.email "bot@claudecode.guide"
          git add data/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
